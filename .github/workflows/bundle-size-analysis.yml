name: bundle-size-analysis

on:
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Bundle Size
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout alpha
        if: ${{ github.event.pull_request.base.ref != 'alpha' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: alpha
          path: refs/alpha

      - name: Checkout PR base ref
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.ref }}
          path: refs/base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: |
          corepack enable
          pnpm --version

      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies and generate snapshots
        shell: bash
        run: |
          set -euo pipefail

          snapshot_checkout() {
            local label="$1"
            local directory="$2"

            echo "Analyzing ${label} in ${directory}"
            (
              cd "${directory}"
              pnpm install --frozen-lockfile --prefer-offline
              node "${GITHUB_WORKSPACE}/tools/scripts/bundle-size-analysis.mts" \
                --skip-build \
                --workspace-root "${directory}" \
                --label "${label}" \
                --git-branch "${label}" \
                --json-output "tmp/bundle-size/${label}/snapshot.json"
            )
          }

          snapshot_checkout "${HEAD_REF}" "${GITHUB_WORKSPACE}"
          snapshot_checkout "${BASE_REF}" "${GITHUB_WORKSPACE}/refs/base"

          if [[ "${BASE_REF}" != "alpha" ]]; then
            snapshot_checkout "alpha" "${GITHUB_WORKSPACE}/refs/alpha"
          fi

      - name: Render comparison report
        shell: bash
        run: |
          set -euo pipefail

          compare_args=(
            --current "tmp/bundle-size/${HEAD_REF}/snapshot.json"
            --baseline "${BASE_REF}=refs/base/tmp/bundle-size/${BASE_REF}/snapshot.json"
            --markdown-output "tmp/bundle-size/comment.md"
            --json-output "tmp/bundle-size/compare.json"
          )

          if [[ "${BASE_REF}" != "alpha" ]]; then
            compare_args+=(
              --baseline "alpha=refs/alpha/tmp/bundle-size/alpha/snapshot.json"
            )
          fi

          node tools/scripts/bundle-size-compare.mts "${compare_args[@]}"

      - name: Write PR metadata
        shell: bash
        run: |
          mkdir -p tmp/bundle-size
          node -e "const { writeFileSync } = require('node:fs'); const path = 'tmp/bundle-size/pr.json'; writeFileSync(path, JSON.stringify({ number: Number(process.env.PR_NUMBER), baseRef: process.env.BASE_REF, headRef: process.env.HEAD_REF }, null, 2) + '\n');"

      - name: Upload bundle-size artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: |
            tmp/bundle-size/comment.md
            tmp/bundle-size/compare.json
            tmp/bundle-size/${{ github.event.pull_request.head.ref }}/snapshot.json
            refs/base/tmp/bundle-size/${{ github.event.pull_request.base.ref }}/snapshot.json
            refs/alpha/tmp/bundle-size/alpha/snapshot.json
            tmp/bundle-size/pr.json
          if-no-files-found: error
          retention-days: 7
