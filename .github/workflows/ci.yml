name: ci

on:
  pull_request: {}

env:
  NODE_OPTIONS: --max-old-space-size=16384
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_VERBOSE_LOGGING: ${{ vars.NX_VERBOSE_LOGGING }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate
        run: pnpm run prettier:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
      - run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build
      - name: Verify
        run: more dist\apps\blog-app\analog\public\index.html

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium --only-shell
      - name: Test
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: .node-version
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Install Cypress
        run: npx cypress install
      - name: create-analog e2e
        run: pnpm nx run create-analog-e2e:e2e --skip-nx-cache
      - name: analog-app Cypress e2e
        env:
          NODE_OPTIONS: ''
          DEBUG: 'cypress:server:*,cypress:launcher:*'
        run: |
          set -euxo pipefail

          pnpm nx serve-nitro analog-app > nitro.log 2>&1 &
          nitro_pid=$!

          cleanup() {
            status=$?
            echo "=== ps ==="
            ps aux || true
            echo "=== port 3000 ==="
            ss -ltnp | grep 3000 || true
            echo "=== nitro log ==="
            cat nitro.log || true
            if kill -0 "$nitro_pid" 2>/dev/null; then
              kill "$nitro_pid" || true
              wait "$nitro_pid" || true
            fi
            exit $status
          }

          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsSI http://localhost:3000
          pnpm nx run analog-app-e2e-cypress:e2e --skip-nx-cache
