name: Release

on:
  push:
    branches:
      - beta
      - main
      - alpha

permissions:
  contents: read # for checkout

jobs:
  version:
    name: Version and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # for provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm install --global corepack@0.31.0
      - run: corepack enable
      - run: pnpm --version
      - run: npm --version
      - name: Install dependencies
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(${{ github.ref_name == 'main' }} && echo 'latest' || echo '${{ github.ref_name }}')"
          # RELEASE_TAG=$TAG npx semantic-release
          pnpm build:release
          npm publish node_modules/@analogjs/astro-angular --tag $TAG
          npm publish node_modules/@analogjs/content --tag $TAG
          npm publish node_modules/@analogjs/platform --tag $TAG
          npm publish node_modules/@analogjs/router --tag $TAG
          npm publish node_modules/@analogjs/storybook-angular --tag $TAG
          npm publish node_modules/@analogjs/vite-plugin-angular --tag $TAG
          npm publish node_modules/@analogjs/vite-plugin-nitro --tag $TAG
          npm publish node_modules/@analogjs/vitest-angular --tag $TAG
          npm publish dist/packages/create-analog --tag $TAG
