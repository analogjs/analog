packages:
  - 'apps/docs-app'
allowBuilds:
  '@compodoc/compodoc': true
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  cypress: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@oxc-angular/binding-darwin-arm64@0.0.32'
  - '@oxc-angular/binding-darwin-x64@0.0.32'
  - '@oxc-angular/binding-linux-arm64-gnu@0.0.32'
  - '@oxc-angular/binding-linux-arm64-musl@0.0.32'
  - '@oxc-angular/binding-linux-x64-gnu@0.0.32'
  - '@oxc-angular/binding-linux-x64-musl@0.0.32'
  - '@oxc-angular/binding-win32-arm64-msvc@0.0.32'
  - '@oxc-angular/binding-win32-x64-msvc@0.0.32'
  - '@oxc-angular/vite@0.0.32'

overrides:
  vite: '^8.0.0'
  '@typescript-eslint/type-utils': '8.57.0'
  webpack: '5.105.4'
